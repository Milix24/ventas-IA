<!DOCTYPE html>
<html>
<head>
<title>Editar Lead</title>

<style>
body {margin:0;font-family:Segoe UI;background:#f1f5f9;}
.sidebar {width:220px;height:100vh;background:#0f172a;color:white;position:fixed;padding:20px;}
.main {margin-left:240px;padding:30px;}

.box {background:white;padding:30px;border-radius:10px;max-width:400px;}

input, textarea {width:100%;padding:10px;margin-bottom:15px;border-radius:6px;border:1px solid #ccc;}
button {background:#10b981;color:white;padding:10px;border:none;border-radius:8px;width:100%;}
</style>
</head>

<body>

<div class="sidebar">
<h2>🚀 Ventas AI</h2>
<a href="/">Dashboard</a>
<a href="/inteligencia">Inteligencia</a>
</div>

<div class="main">
<div class="box">

<h2>Editar Lead</h2>

<form method="POST">
<input type="text" name="nombre" value="{{ lead['nombre'] }}">
<input type="text" name="telefono" value="{{ lead['telefono'] }}">
<textarea name="nota">{{ lead['nota'] }}</textarea>

<button>Guardar cambios</button>
</form>

</div>
</div>

</body>
</html>
