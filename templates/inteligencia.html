<!DOCTYPE html>
<html>
<head>
<title>Inteligencia</title>

<style>
body {margin:0;font-family:Segoe UI;background:#f1f5f9;}
.sidebar {width:220px;height:100vh;background:#0f172a;color:white;position:fixed;padding:20px;}
.main {margin-left:240px;padding:30px;}

.card {background:white;padding:20px;border-radius:10px;margin-bottom:15px;}
.btn {background:#22c55e;color:white;padding:8px 12px;border-radius:6px;text-decoration:none;}
</style>
</head>

<body>

<div class="sidebar">
<h2>🚀 Ventas AI</h2>
<a href="/">Dashboard</a>
<a href="/nuevo">Nuevo Lead</a>
<a href="/inteligencia">Inteligencia</a>
</div>

<div class="main">

<h2>🧠 Acciones del día</h2>

{% for item in data %}
<div class="card">
<b>{{ item.lead['nombre'] }}</b><br><br>
Acción: {{ item.accion }}<br><br>

Mensaje:<br>
<i>{{ item.mensaje }}</i><br><br>

<a class="btn" href="/abrir/{{ item.lead['id'] }}">Enviar WhatsApp</a>
</div>
{% endfor %}

</div>

</body>
</html>
