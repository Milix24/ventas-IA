<!DOCTYPE html>
<html>
<head>
<title>Ventas AI</title>

<style>
body {margin:0;font-family:Segoe UI;background:#f1f5f9;}
.sidebar {width:220px;height:100vh;background:#0f172a;color:white;position:fixed;padding:20px;}
.sidebar a {display:block;color:#cbd5e1;text-decoration:none;margin:10px 0;}
.main {margin-left:240px;padding:30px;}

.btn {background:#10b981;color:white;padding:10px;border-radius:8px;text-decoration:none;}

table {width:100%;background:white;border-collapse:collapse;margin-top:20px;}
th {background:#1e293b;color:white;padding:12px;}
td {padding:12px;border-bottom:1px solid #eee;}

.acciones a {padding:6px 10px;border-radius:6px;color:white;text-decoration:none;font-size:12px;margin-right:5px;}
.int{background:#ef4444;}
.cont{background:#f59e0b;}
.nuevo{background:#3b82f6;}
.wa{background:#22c55e;}
.del{background:#111827;}
</style>

</head>
<body>

<div class="sidebar">
<h2>🚀 Ventas AI</h2>
<a href="/">Dashboard</a>
<a href="/nuevo">Nuevo Lead</a>
<a href="/inteligencia">Inteligencia</a>
</div>

<div class="main">
<h2>Leads</h2>

<a href="/nuevo" class="btn">➕ Agregar Lead</a>

<table>
<tr>
<th>Negocio</th>
<th>Estado</th>
<th>Nota</th>
<th>Acciones</th>
</tr>

{% for lead in leads %}
<tr>
<td>{{ lead["nombre"] }}</td>
<td>{{ lead["estado"] }}</td>
<td>{{ lead["nota"] }}</td>
<td class="acciones">
<a class="int" href="/estado/{{ lead['id'] }}/interesado">Interesado</a>
<a class="cont" href="/estado/{{ lead['id'] }}/contactado">Contactado</a>
<a class="nuevo" href="/estado/{{ lead['id'] }}/nuevo">Nuevo</a>
<a class="wa" href="/abrir/{{ lead['id'] }}">WhatsApp</a>
<a class="cont" href="/editar/{{ lead['id'] }}">Editar</a>
<a class="del" href="/eliminar/{{ lead['id'] }}">Eliminar</a>
</td>
</tr>
{% endfor %}
</table>

</div>
</body>
</html>
